name: PR

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # Coverage opt-in only: run `pnpm exec vitest run --coverage` locally
      # after `pnpm add -Dw @vitest/coverage-v8`. Not in CI yet — the
      # coverage gates in vitest.config.ts apply if/when invoked.
